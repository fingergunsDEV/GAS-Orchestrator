<script>
(function() {
  var { createApp, ref, reactive, onMounted, nextTick, computed, watch } = Vue;

  try {
    const app = createApp({
      setup() {
        var logs = ref([]);
        var commandHistory = ref([]);
        var historyIndex = ref(-1);
        var currentCommand = ref('');
        var isProcessing = ref(false);
        var isConnected = ref(false);
        var sessionId = ref(null);
        var currentTime = ref("");
        var uiTheme = ref('cyan');
        var currentView = ref('terminal');
        var mobileMenuOpen = ref(false);
        var isRecording = ref(false);
        var userEmail = ref("admin@agency");

        // Analysis View State
        var analysisInputMethod = ref('url');
        var analysisUrl = ref('');
        var analysisText = ref('');
        var analysisContext = ref({ entity: '', location: '', topic: '' });
        var analysisResults = ref(null);
        var isAnalyzing = ref(false);

        // Rewrite & Forecast State
        var isForecasting = ref(false);
        var forecastData = ref(null);
        var rewrittenArticle = ref(null);
        var originalArticleForModal = ref('');
        var showRewriteModal = ref(false);

        var hgmSwarm = ref([]);
        var swarmMessages = ref([]);

        var pipelineStages = ref([
          { name: 'PIPELINE_INIT', status: 'QUEUED', log: 'Awaiting execution...' }
        ]);
        var pipelineStatus = ref('IDLE'); // IDLE, RUNNING, SUCCESS, FAILED
        var pipelineError = ref(null);

        var intelligenceNodes = ref([]);
        var intelligenceEdges = ref([]);
        var activeNode = ref(null);
        var mapInitialized = ref(false);

        var articles = ref([]);
        var newArticle = reactive({ id: null, title: '', docUrl: '', publishedUrl: '' });

        var leads = ref([]);
        var newLead = reactive({
            id: null, name: '', email: '', status: 'New', source: 'Manual', notes: ''
        });
        var leadEmailHistory = ref([]);
        var isFetchingHistory = ref(false);
        var selectedLeadForHistory = ref(null);

        var financeData = ref({
            revenue: [],
            expenses: [],
            net: [],
            summary: { totalRevenue: 0, totalExpenses: 0, netProfit: 0, profitMargin: 0 }
        });
        var isFetchingFinance = ref(false);

        // Coding Module State (v4.18.0)
        var githubState = reactive({
          owner: '',
          repo: '',
          branch: 'main',
          isFetchingTree: false,
          tree: [],
          chatHistory: [],
          isProcessing: false,
          userInput: ''
        });
        var recentProjects = ref([]);

        // METHODS
        var addLog = function(source, message, type = 'info') {
            logs.value.unshift({ source, message, type, time: new Date().toLocaleTimeString() });
            if (logs.value.length > 200) {
                logs.value.pop();
            }
        };

        var sendMessage = function(overrideMessage = null) {
            var message = overrideMessage || currentCommand.value;
            if (!message.trim() || isProcessing.value) return;

            addLog('user', message, 'user');
            isProcessing.value = true;
            
            if (overrideMessage) {
              // It's a system-sent message, don't add to command history
            } else {
              commandHistory.value.unshift(message);
              if (commandHistory.value.length > 50) commandHistory.value.pop();
              historyIndex.value = -1;
              currentCommand.value = '';
            }

            if (typeof google !== 'undefined' && google.script) {
                google.script.run
                    .withSuccessHandler(function(response) {
                        addLog('model', response, 'model');
                        isProcessing.value = false;
                        handleSpecialCommands(response);
                    })
                    .withFailureHandler(function(err) {
                        addLog('system', 'Execution failed: ' + err.message, 'error');
                        isProcessing.value = false;
                    })
                    .processUserMessage(message, sessionId.value);
            } else {
                // Local dev fallback
                setTimeout(function() {
                    addLog('model', 'Dev response for: ' + message, 'model');
                    isProcessing.value = false;
                }, 1000);
            }
        };

        var triggerContentAnalysis = function() {
          if (analysisInputMethod.value === 'url' && !analysisUrl.value) {
            addLog('ERR', 'Please provide a Target URL.', 'error');
            return;
          }
          if (analysisInputMethod.value === 'text' && !analysisText.value) {
            addLog('ERR', 'Please paste the Raw Text.', 'error');
            return;
          }

          isAnalyzing.value = true;
          analysisResults.value = null;
          forecastData.value = null;
          rewrittenArticle.value = null;
          addLog('SYS', 'Initiating Content Quality Analysis...', 'info');

          var payload = {
            method: analysisInputMethod.value,
            url: analysisUrl.value,
            text: analysisText.value,
            context: analysisContext.value
          };

          if (typeof google !== 'undefined' && google.script) {
            google.script.run.withSuccessHandler(function(res) {
              isAnalyzing.value = false;
              if (res.success && res.data) {
                analysisResults.value = res.data;
                addLog('SYS', 'Content Analysis Complete. Score: ' + res.data.entropyScore, 'success');
              } else {
                addLog('ERR', 'Analysis Failed: ' + (res.error || 'Unknown Error'), 'error');
              }
            }).withFailureHandler(function(err) {
              isAnalyzing.value = false;
              addLog('ERR', 'Analysis Failed: ' + err.message, 'error');
            }).runContentAnalysis(payload);
          } else {
             setTimeout(function() {
               isAnalyzing.value = false;
               analysisResults.value = { entropyScore: 25, topProblems: [{title: "Pervasive Cliche Usage", description: "The page is built on generic marketing phrases."}], dimensions: { lexicalDiversity: { score: 2, explanation: "Heavily repeats generic marketing terms." }, syntacticBurstiness: { score: 3, explanation: "Most sentences are simple, declarative statements." } } };
             }, 2000);
          }
        };
        
        var triggerForecastAndRewrite = function() {
            if (!analysisResults.value) {
                addLog('ERR', 'Cannot run forecast without a completed analysis.', 'error');
                return;
            }
            isForecasting.value = true;
            addLog('SYS', 'Initiating Performance Forecast & Content Rewrite...', 'info');

            var payload = {
                url: analysisUrl.value,
                text: analysisInputMethod.value === 'text' ? analysisText.value : 'FETCH_FROM_URL', // Let backend fetch if needed
                analysis: analysisResults.value
            };

            google.script.run
                .withSuccessHandler(function(res) {
                    if (res.success && res.data) {
                        forecastData.value = res.data.forecast;
                        rewrittenArticle.value = res.data.rewrite;
                        addLog('SYS', 'Forecast & Rewrite complete.', 'success');
                    } else {
                        addLog('ERR', 'Forecast/Rewrite Failed: ' + (res.error || 'Unknown Error'), 'error');
                    }
                    isForecasting.value = false;
                })
                .withFailureHandler(function(err) {
                    addLog('ERR', 'Forecast/Rewrite Script Error: ' + err.message, 'error');
                    isForecasting.value = false;
                })
                .runForecastAndRewrite(payload);
        };

        var openRewriteModal = function() {
          originalArticleForModal.value = analysisInputMethod.value === 'text' ? analysisText.value : "Original article fetched from:\n" + analysisUrl.value;
          showRewriteModal.value = true;
        };

        // GITHUB / CODING METHODS (v4.18.0)
        var fetchRecentProjects = function() {
          if (typeof google !== 'undefined') {
            google.script.run.withSuccessHandler(function(res) {
              recentProjects.value = res || [];
            }).getRecentProjects();
          }
        };

        var onRecentProjectChange = function(event) {
          var val = event.target.value;
          if (!val) return;
          try {
            var proj = JSON.parse(val);
            githubState.owner = proj.owner;
            githubState.repo = proj.repo;
            githubState.branch = proj.branch;
            fetchRepoStructure();
          } catch(e) {
            addLog('ERR', 'Failed to parse recent project data.', 'error');
          }
        };

        var fetchRepoStructure = function() {
          if (!githubState.owner || !githubState.repo) {
            addLog('ERR', 'Owner and Repository name required.', 'error');
            return;
          }
          githubState.isFetchingTree = true;
          addLog('SYS', 'Fetching repository structure...', 'info');
          
          google.script.run.withSuccessHandler(function(res) {
            githubState.tree = res || [];
            githubState.isFetchingTree = false;
            addLog('SYS', 'Repository linked successfully.', 'success');
            
            // Save as recent
            google.script.run.withSuccessHandler(function(updated) {
              recentProjects.value = updated || [];
            }).saveProjectUsage(githubState.owner, githubState.repo, githubState.branch);
          }).withFailureHandler(function(err) {
            githubState.isFetchingTree = false;
            addLog('ERR', 'GitHub Error: ' + err.message, 'error');
          }).github_get_tree(githubState.owner, githubState.repo, githubState.branch);
        };

        var runCodingTask = function() {
          if (!githubState.userInput.trim() || githubState.isProcessing) return;
          
          var task = githubState.userInput;
          githubState.chatHistory.push({ role: 'user', text: task });
          githubState.userInput = '';
          githubState.isProcessing = true;
          
          addLog('DEV', 'Executing coding directive: ' + task, 'info');

          google.script.run.withSuccessHandler(function(res) {
            githubState.chatHistory.push({ role: 'model', text: typeof res === 'string' ? res : res.text });
            githubState.isProcessing = false;
            if (res.sessionId) sessionId.value = res.sessionId;
          }).withFailureHandler(function(err) {
            githubState.chatHistory.push({ role: 'model', text: 'CRITICAL_ENGINE_FAILURE: ' + err.message });
            githubState.isProcessing = false;
          }).handleRequest(task, null, 'coding_' + (sessionId.value || 'new'));
        };

        var syncGasToGithub = function() {
          if (!githubState.owner || !githubState.repo) {
            addLog('ERR', 'Owner and Repository name required for sync.', 'error');
            return;
          }
          addLog('SYS', 'Initiating full codebase sync to GitHub...', 'info');
          google.script.run.withSuccessHandler(function(res) {
            addLog('SYS', 'Sync Complete: ' + (res.message || 'Success'), 'success');
          }).withFailureHandler(function(err) {
            addLog('ERR', 'Sync Failed: ' + err.message, 'error');
          }).github_sync_to_gas(githubState.owner, githubState.repo, githubState.branch);
        };

        var executeSaveArticle = function() { ... };
        var sendArticleToAnalysis = function() { ... };

        // LIFECYCLE
        onMounted(function() {
          fetchRecentProjects();
        });

        return {
          // Refs & State
          logs, commandHistory, currentCommand, isProcessing, isConnected, sessionId, currentTime, uiTheme, currentView, mobileMenuOpen, isRecording, userEmail,
          analysisInputMethod, analysisUrl, analysisText, analysisContext, analysisResults, isAnalyzing,
          isForecasting, forecastData, rewrittenArticle, originalArticleForModal, showRewriteModal,
          githubState, recentProjects,
          // Methods
          addLog, sendMessage, triggerContentAnalysis, triggerForecastAndRewrite, openRewriteModal,
          fetchRepoStructure, runCodingTask, syncGasToGithub, onRecentProjectChange
        };
      }
    });
    app.mount('#app');
    document.getElementById('static-boot-overlay').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
  } catch (e) {
    var errDiv = document.createElement('div');
    errDiv.style.cssText = 'position:fixed; top:0; left:0; right:0; background:red; color:white; padding:20px; z-index:99999;';
    errDiv.innerText = 'CRITICAL INITIALIZATION ERROR: ' + e.message;
    document.body.appendChild(errDiv);
  }
})();
</script>
