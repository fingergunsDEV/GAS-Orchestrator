<script>
(function() {
  var { createApp, ref, reactive, onMounted, nextTick, computed, watch } = Vue;

  try {
    var app = createApp({
      setup: function() {
        var booting = ref(true);

        var userInput = ref("");

        var sessionId = ref(null);
        var currentTime = ref("");
        var uiTheme = ref('cyan');
        var currentView = ref('terminal');
        var simMode = ref(false);
        var isRecording = ref(false);
        var userEmail = ref("admin@agency");
        var codingSubTab = ref("terminal");

        var hgmSwarm = ref([]);
        var swarmMessages = ref([]);

        var pipelineStages = ref([
          { name: 'PIPELINE_INIT', status: 'QUEUED', log: 'Awaiting execution...' }
        ]);
        var activePipelineStage = ref(0);

        var sandboxProjects = ref([
          { label: "UNIT_TEST_AUTOMATION", desc: "Scaffold a robust testing suite that validates core agentic workflows (Mulch, Seeds, Canopy) and integrates them into the existing GitHub Actions CI/CD pipeline." },
          { label: "PROACTIVE_LEAD_HUNTER", desc: "Build an intelligence gathering loop using Google Search to find new local businesses, enrich their data, and automatically add them to the CRM pipeline." },

          { label: "SEO_LEAD_MAGNET", desc: "Create a background worker that runs automated SEO audits for newly acquired leads and emails them a branded PDF report to build immediate trust." },
          { label: "SWARM_CODE_REVIEWER", desc: "Configure the Orchestrator to monitor all open Seeds. When a Seed is marked 'in_progress', deploy a swarm of agents to build, review, and unit test the feature." }
        ]);

        var startSandboxProject = function(proj) {
          codingSubTab.value = 'terminal';
          
          var guardrails = "\n\n[GUARDRAIL_PROTOCOL]\n" +
                           "1. STRICT SCOPE: Only create or modify files directly required for this exact blueprint.\n" +
                           "2. NON-DESTRUCTIVE: Do not delete existing core files or alter foundational system logic.\n" +
                           "3. VALIDATION: Ensure the generated code includes robust error handling, typing, and logging.\n" +
                           "4. AUDIT TRAIL: Use 'mulch_record' or system logs to document the architectural pattern you implement.\n" +
                           "5. AUTONOMY LIMITS: Do not automatically deploy to production without explicit user confirmation.\n" +
                           "6. NO BRANCHING: Due to potential permission limits, do NOT attempt to create new git branches. Commit directly to the target branch or edit the local files directly.";

          githubState.userInput = "Use the Technical R&D capabilities to architect and scaffold the " + proj.label + " blueprint. " + proj.desc + guardrails;
          setTimeout(function() { runCodingTask(); }, 500);
        };

        var triggerWorkflow = function() {
          if (!sessionId.value) return;
          if (!githubState.owner || !githubState.repo) {
            addLog('ERR', 'Please configure GitHub Owner and Repo in the terminal first.', 'error');
            return;
          }
          addLog('SYS', 'Triggering CI/CD Pipeline workflow on GitHub Actions...', 'info');
          activePipelineStage.value = 0;
          pipelineStages.value.forEach(function(s) { s.status = 'QUEUED'; s.log = 'Awaiting execution...'; });
          
          google.script.run.withSuccessHandler(function(res) {
             var data = JSON.parse(res);
             if (data.success) {
               addLog('SYS', 'GitHub Action triggered. Polling for status...', 'success');
               pollGithubPipelineStatus();
             } else {
               addLog('ERR', 'Failed to trigger workflow: ' + data.message, 'error');
             }
          }).triggerGithubPipeline({ 
            sessionId: sessionId.value,
            owner: githubState.owner,
            repo: githubState.repo,
            branch: githubState.branch
          });
        };

        var pollGithubPipelineStatus = function() {
          var interval = setInterval(function() {
            google.script.run.withSuccessHandler(function(res) {
              var data = JSON.parse(res);
              if (data.success && data.stages && data.stages.length > 0) {
                pipelineStages.value = data.stages;
                
                var activeIdx = data.stages.findIndex(function(s) { return s.status === 'RUNNING'; });
                if (activeIdx !== -1) activePipelineStage.value = activeIdx;
                
                var isComplete = data.stages.every(function(s) { return s.status === 'PASS' || s.status === 'FAIL'; });
                if (isComplete) {
                  clearInterval(interval);
                  addLog('SYS', 'Pipeline execution finished on GitHub.', 'info');
                }
              }
            }).checkGithubPipelineStatus({
              owner: githubState.owner,
              repo: githubState.repo,
              branch: githubState.branch

          addLog('SYS', 'Fetching recent commits from GitHub...', 'info');
          
          google.script.run.withSuccessHandler(function(res) {
            isFetchingCommits.value = false;
            var data = JSON.parse(res);
            if (data.success) {
              recentCommits.value = data.commits || [];
            } else {
              addLog('ERR', 'Failed to fetch commits: ' + data.message, 'error');
            }

            repo: githubState.repo,

        // NEURAL TOPOLOGY DATA (Agentic Architecture Heuristic)
        var center = ref({ x: 0, y: 0 });

        var neuralBarValues = ref([65, 42, 88, 12]);

          { id: 3, name: 'TOOL_DISPATCHER', type: 'Execution', load: 0, status: 'Idle', team: 'CORE' },

        var geoPulseData = ref({ realtime: [], historical: [], totalRealtime: 0, avgSessionDuration: '0m 0s', timestamp: null });
        var activePings = ref([]);
        var pulseSubTab = ref('geo');

        var totalHistoricalSessions = computed(function() {

        });

          if (!geoPulseData.value.timestamp) return '---';

        });

        var fetchGeoPulseData = function() {
          if (typeof google !== 'undefined' && google.script) {
            isProcessing.value = true;
            google.script.run.withSuccessHandler(function(res) {
              isProcessing.value = false;
              if (res.error) {
                addLog('ERR', 'GA4: ' + res.error, 'error');
              } else {
                geoPulseData.value = res;
                addLog('SYS', 'Pulse Sync (' + pulseDateRange.value + ') Complete.', 'success');
                if (res.realtime && res.realtime.length > 0) triggerPings(res.realtime, false);
                if (res.historical && res.historical.length > 0) triggerPings(res.historical.slice(0, 10), true);
                if (pulseSubTab.value === 'chart') {
                  nextTick(renderPulseChart);
                }
              }
            }).getGeoPulseData(null, pulseDateRange.value);

        watch(pulseDateRange, function() {
          fetchGeoPulseData();

        var dataStreams = ref([]);
        var diagnosticIssues = ref([]);
        var recentFiles = ref([]);
        var knowledgeMeta = ref(null);
        var sentinels = ref([]); // Single source of truth
        
        // EXTREME DEFENSE: Watcher to ensure sentinels is NEVER a non-array
        watch(sentinels, function(newVal) {
          if (newVal && !Array.isArray(newVal)) {
            console.error("[Sentinel_Guard] Non-array value detected, resetting to []. Value was:", newVal);
            sentinels.value = [];
          }
        }, { deep: false });
        var contextualActions = ref([]);
        var quickFact = ref("");
        var curateTopic = ref("");
        var gDocUrl = ref("");
        var apiUrl = ref("");

        var uiColor = computed(function() {
          if (isProcessing.value) return '#ffaa00';
          var colors = {
            'cyan': '#00f3ff',
            'gold': '#d4af37',
            'emerald': '#10b981',
            'plasma': '#a855f7',
            'obsidian': '#ffffff'
          };
          return colors[uiTheme.value] || '#00f3ff';
        });

        var toggleTheme = function() {
          var themes = ['cyan', 'gold', 'emerald', 'plasma', 'obsidian'];
          var idx = themes.indexOf(uiTheme.value);
          uiTheme.value = themes[(idx + 1) % themes.length];
          addLog('SYS', 'UI_THEME synced to ' + uiTheme.value.toUpperCase(), 'success');
        };

        var toggleSim = function() { simMode.value = !simMode.value; };

        var initCanvas = function() {
          var canvas = document.getElementById('neural-canvas');
          if(!canvas) return; 
          var ctx = canvas.getContext('2d');
          var w, h, pts = [];

          var resize = function() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            pts = [];
            for (var i = 0; i < 50; i++) {
              pts.push({
                x: Math.random() * w, y: Math.random() * h,
                vX: (Math.random()-0.5)*0.4, vY: (Math.random()-0.5)*0.4
              });
            }
          };
          
          var draw = function() {
            ctx.clearRect(0, 0, w, h);
            ctx.fillStyle = uiColor.value;
            ctx.strokeStyle = uiColor.value + '22';
            pts.forEach(function(p, i) {
              p.x += p.vX; p.y += p.vY;
              if(p.x<0||p.x>w) p.vX*=-1; if(p.y<0||p.y>h) p.vY*=-1;
              ctx.beginPath(); ctx.arc(p.x, p.y, 1, 0, Math.PI*2); ctx.fill();
              for (var j = i + 1; j < pts.length; j++) {
                var p2 = pts[j];
                var d = Math.hypot(p.x-p2.x, p.y-p2.y);
                if(d<180) { ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y); ctx.stroke(); }
              }
            });
            requestAnimationFrame(draw);
          };
          window.addEventListener('resize', resize); resize(); draw();
        };

        var runBoot = function() {
          var logs = ["Strategic Check", "Asset Mapping", "Data established", "Dept Handshake", "Campaign Sync"];
          var i = 0;
          var interval = setInterval(function() {
            bootProgress.value += 20;
            var statusText = logs[i++] || "Operational";
            bootStatus.value = statusText;
            
            var staticStatus = document.getElementById('boot-status-text');
            if (staticStatus) staticStatus.innerText = statusText + "...";

            if(bootProgress.value >= 100) {
              clearInterval(interval);
              setTimeout(function() { 
                booting.value = false; 
                var appEl = document.getElementById('app');
                if (appEl) {
                  appEl.style.display = 'flex';
                  appEl.classList.add('v-cloak-initialized');

                var staticOverlay = document.getElementById('static-boot-overlay');
                if (staticOverlay) staticOverlay.style.display = 'none';
                nextTick(initCanvas); 
              }, 600);
            }

        setInterval(function() { currentTime.value = new Date().toLocaleTimeString(); }, 1000);

        var addLog = function(source, message, type) {
          type = type || 'info';
          var time = new Date().toLocaleTimeString([], { hour12: false, hour: '2-digit', minute:'2-digit', second:'2-digit' });
          eventLogs.value.push({ time: time, source: source, message: message, type: type });
          nextTick(function() { if (logBox.value) logBox.value.scrollTop = logBox.value.scrollHeight; });
        };

        var getLogColor = function(t) { 
          if (t === 'error') return '#ef4444';
          if (t === 'success') return '#22c55e';
          if (t === 'tool') return '#ffaa00';
          return '#00f3ff';
        };

        var renderMarkdown = function(text) {
          if (!text) return "";
          if (typeof marked === 'undefined') return text;
          try {
            return marked.parse(text);
          } catch(e) {
            return text;
          }
        };

          if (fileInput.value) fileInput.value.click();
        };

        var handleFileSelect = function(e) {
          var f = e.target.files[0]; if (!f) return;
          var r = new FileReader(); r.onload = function(ev) { 
            selectedImage.value = { name: f.name, mimeType: f.type, data: ev.target.result.split(',')[1] }; 
          };
          r.readAsDataURL(f);
        };
        var clearImage = function() { selectedImage.value = null; if(fileInput.value) fileInput.value.value = ""; };

        var assetFileInput = ref(null);
        var openAssetPicker = function() {
          if (assetFileInput.value) assetFileInput.value.click();
        };

        var fetchRecentFiles = function() {
          if (typeof google !== 'undefined' && google.script) {
            google.script.run.withSuccessHandler(function(files) { 
              recentFiles.value = files || []; 
            }).getRecentSystemFiles();
          }
        };

        var handleAssetSelect = function(e) {
          var f = e.target.files[0]; if (!f) return;
          addLog('SYS', 'Establishing secure asset uplink for: ' + f.name);
          var r = new FileReader(); r.onload = function(ev) { 
            var base64 = ev.target.result.split(',')[1];
            if (typeof google !== 'undefined' && google.script) {
              google.script.run.withSuccessHandler(function(res) {
                addLog('VAULT', res, 'success');
                fetchRecentFiles();
              }).saveAssetToDrive(f.name, f.type, base64);
            }
          };
          r.readAsDataURL(f);
        };

        var leads = ref([]);
        var quickSlashCommands = ref([
          { label: "HELP", cmd: "/help", desc: "System manual & commands" },
          { label: "TOOLS", cmd: "/list", desc: "Active tool manifest" },
          { label: "APIS", cmd: "/apis", desc: "Credential status audit" },
          { label: "SAFE", cmd: "/dryrun", desc: "Toggle simulation mode" },
          { label: "GUARD", cmd: "/sensitive", desc: "Security protocol list" },
          { label: "RESET", cmd: "/reset", desc: "Emergency session purge" }

          if (typeof google !== 'undefined' && google.script) {

              var excelFile = files.find(function(f) { return f.name.toLowerCase().includes('crm') && f.name.includes('.xlsx'); });

                addLog('SYS', res, res.startsWith('Error') ? 'error' : 'success');

              }).importLeadsFromSource(source);

              addLog('MAIL', res, 'success');
              fetchLeads();
            }).syncCrmInbox();
          }

        var deployLeadAction = function(lead, action) {
          var prompt = "";
          if (action === 'audit') {
            prompt = "Perform a COMPREHENSIVE EXTERNAL AUDIT for " + lead.company + " at " + lead.website + ". " +
                     "Use leadId: '" + lead.lead_id + "'. " +

                     "2. Conversion Optimization (CTAs & Friction)\n" +

 else if (action === 'research') {

        var sendMessage = function(customText) {
          var textToSubmit = (typeof customText === 'string') ? customText : userInput.value;
          if (!textToSubmit.trim() && !selectedImage.value) return;

          // Check if this is a generation request from Content Engine
          var isGenerationRequest = (typeof customText === "string" && (
            customText.indexOf("Generate a") === 0 || 
            customText.indexOf("Create a strategic proposal") === 0 || 
            customText.indexOf("Draft a") === 0
          ));

          if (isGenerationRequest) {
            engineData.value.isGenerating = true;
            engineData.value.generatedResult = "";
          }

          var img = selectedImage.value;
          if (typeof customText !== 'string') {
            chatHistory.value.push({ role: 'user', text: textToSubmit + (img ? " [ATTACHED]" : "") });
            userInput.value = "";
            clearImage();
          }

          isProcessing.value = true; 
          startPolling();

          if (typeof google !== 'undefined' && google.script) {
            google.script.run.withSuccessHandler(function(res) {
              isProcessing.value = false; 
              stopPolling(); 
              if (res.sessionId) sessionId.value = res.sessionId;

              var modelText = res.text || "COMPLETE.";
              chatHistory.value.push({ role: 'model', text: modelText });

              // CAPTURE RESULT FOR CONTENT ENGINE
              if (isGenerationRequest) {
                engineData.value.generatedResult = modelText;
                engineData.value.isGenerating = false;
                addLog("CONTENT", "Generation complete. Review result in Content Engine.", "success");
              }

              if (modelText.includes("MISSION_CONTINUE")) {
                addLog('SYS', 'Mission Pulse: Auto-proceeding...', 'info');
                setTimeout(function() { sendMessage("Resume mission"); }, 800);
              }
              nextTick(function() { if(chatBox.value) chatBox.value.scrollTop = chatBox.value.scrollHeight; });
            }).withFailureHandler(function(err) {
              isProcessing.value = false; 
              stopPolling(); 
              engineData.value.isGenerating = false;
              addLog('ERR', err.message, 'error');

        var triggerPings = function(locations, isHistorical) {
          locations.forEach(function(loc) {
            var coords;
            var hasCoords = loc.lat && loc.lat !== "0" && loc.lat !== "(not set)";
            if (hasCoords) {
              var x = (parseFloat(loc.lng) + 180) * (100 / 360);
              var y = (90 - parseFloat(loc.lat)) * (100 / 180);
              y = y * 0.9 + 5; 
              coords = { x: x, y: y, spread: 0.5 };
            } else {
              coords = getRegionHeuristic(loc.country || loc.city);
            }
            var pingCount = isHistorical ? 1 : Math.min(loc.users || 1, 5);
            for(var i=0; i<pingCount; i++) {
              setTimeout(function() {
                var pingId = Date.now() + Math.random();
                var xPos = coords.x + (Math.random() - 0.5) * coords.spread;
                var yPos = coords.y + (Math.random() - 0.5) * coords.spread;
                activePings.value.push({ id: pingId, x: xPos, y: yPos, type: isHistorical ? 'ghost' : 'live' });
                setTimeout(function() { 
                  activePings.value = activePings.value.filter(function(p) { return p.id !== pingId; });
                }, isHistorical ? 3000 : 2000);
              }, Math.random() * (isHistorical ? 10000 : 2000));
            }
          });
        };

            var s = (l.status || 'NEW').toString().toUpperCase();
            statusMap[s] = (statusMap[s] || 0) + 1;
          });

          console.log("[LeadsChart] Status Map:", statusMap);

          // LOGICAL PIPELINE ORDER
          var order = ['HOT', 'WARM', 'COLD', 'NURTURE', 'INTERESTED?', 'PROPOSAL', 'CLOSED', 'NEW'];
          var labels = Object.keys(statusMap).sort(function(a, b) {
            var idxA = order.indexOf(a);
            var idxB = order.indexOf(b);
            if (idxA === -1) idxA = 99;
            if (idxB === -1) idxB = 99;
            return idxA - idxB;
          });
          var data = labels.map(function(l) { return statusMap[l]; });

          // Generate semi-random high-tech colors for the chart
          var backgroundColors = labels.map(function(l, i) {
            var hues = [20, 190, 280, 140, 340, 45, 210];
            var h = hues[i % hues.length];
            return 'hsla(' + h + ', 70%, 50%, 0.6)';
          });
          var borderColors = labels.map(function(l, i) {
            var hues = [20, 190, 280, 140, 340, 45, 210];
            var h = hues[i % hues.length];
            return 'hsla(' + h + ', 70%, 50%, 1)';
          });

          if (window.leadsChartInstance) window.leadsChartInstance.destroy();

          window.leadsChartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
              labels: labels,
              datasets: [{
                label: 'Lead Distribution',
                data: data,
                backgroundColor: backgroundColors,
                borderColor: borderColors,
                borderWidth: 1,
                barThickness: 20
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              scales: {
                y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#666', stepSize: 1, font: { size: 8 } } },
                x: { grid: { display: false }, ticks: { color: '#888', font: { family: 'Orbitron', size: 8 } } }
              },
              plugins: { 
                legend: { display: false },
                tooltip: {
                  backgroundColor: 'rgba(0,0,0,0.8)',
                  titleFont: { family: 'Orbitron', size: 10 },
                  bodyFont: { family: 'JetBrains Mono', size: 10 }
                }
              }
            }
          });
        };
        var renderPulseChart = function() {
          var ctxTrend = document.getElementById('pulseChart');
          var ctxVol = document.getElementById('volumeChart');
          var ctxEng = document.getElementById('engagementChart');
          
          if (!ctxTrend || !ctxVol || !ctxEng) {
            console.warn("Pulse charts requested but canvas elements not found in DOM.");
            return;
          }

          console.log("Rendering Pulse Charts for range: " + pulseDateRange.value);

          // 1. RENDER VOLUME CHART (Line Chart)
          var volLabels = [];
          var volSessions = [];
          var volEngage = [];
          
          if (geoPulseData.value.volume && geoPulseData.value.volume.length > 0) {
            volLabels = geoPulseData.value.volume.map(function(v) { 
              var d = v.date; 
              return d.substring(4,6) + '/' + d.substring(6,8); 
            });
            volSessions = geoPulseData.value.volume.map(function(v) { return v.sessions; });
            volEngage = geoPulseData.value.volume.map(function(v) { return (v.engagement * 100).toFixed(1); });
          } else {
            volLabels = ['No Data'];
            volSessions = [0];
            volEngage = [0];
          }

          // VOLUME CHART
          if (window.volChartInstance) window.volChartInstance.destroy();
          window.volChartInstance = new Chart(ctxVol, {
            type: 'line',
            data: {
              labels: volLabels,
              datasets: [{
                label: 'Sessions',
                data: volSessions,
                borderColor: '#3b82f6',
                backgroundColor: 'rgba(59, 130, 246, 0.1)',
                fill: true,
                tension: 0.4,
                pointRadius: 2
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              animation: { duration: 800 },
              scales: {
                y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#555', font: { size: 7 } } },
                x: { grid: { display: false }, ticks: { color: '#555', font: { size: 7 }, maxRotation: 0 } }
              },
              plugins: { legend: { display: false } }
            }
          });

          // ENGAGEMENT CHART
          if (window.engChartInstance) window.engChartInstance.destroy();
          window.engChartInstance = new Chart(ctxEng, {
            type: 'line',
            data: {
              labels: volLabels,
              datasets: [{
                label: 'Engage Rate %',
                data: volEngage,
                borderColor: '#10b981',
                backgroundColor: 'rgba(16, 185, 129, 0.1)',
                fill: true,
                tension: 0.4,
                pointRadius: 2
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              animation: { duration: 800 },
              scales: {
                y: { beginAtZero: true, max: 100, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#555', font: { size: 7 } } },
                x: { grid: { display: false }, ticks: { color: '#555', font: { size: 7 }, maxRotation: 0 } }
              },
              plugins: { legend: { display: false } }
            }
          });

          // 2. RENDER TOP 10 PERFORMANCE (Bar Chart)
          var labels = [];
          var clicks = [];
          var impressions = [];

          if (geoPulseData.value.trends && geoPulseData.value.trends.length > 0) {
            labels = geoPulseData.value.trends.map(function(t) { 
              var path = t.url.replace(/^https?:\/\/[^\/]+/, '');
              if (path === '') path = '/';
              return path.length > 25 ? path.substring(0, 22) + '...' : path;
            });
            clicks = geoPulseData.value.trends.map(function(t) { return t.clicks; });
            impressions = geoPulseData.value.trends.map(function(t) { return t.impressions; });
          } else {
            // Dynamic error feedback
            var status = geoPulseData.value.gscStatus || "CHECK_SETTINGS";
            labels = [status === "OK" ? "No Data for Period" : status];
            clicks = [0];
            impressions = [0];
          }

          if (window.pulseChartInstance) window.pulseChartInstance.destroy();
          window.pulseChartInstance = new Chart(ctxTrend, {
            type: 'bar',
            data: {
              labels: labels,
              datasets: [
                {
                  label: 'Clicks',
                  data: clicks,
                  backgroundColor: 'rgba(6, 182, 212, 0.6)',
                  borderColor: '#06b6d4',
                  borderWidth: 1,
                  barThickness: 6
                },
                {
                  label: 'Impressions',
                  data: impressions,
                  backgroundColor: 'rgba(168, 85, 247, 0.4)',
                  borderColor: '#a855f7',
                  borderWidth: 1,
                  barThickness: 6
                }
              ]
            },
            options: {
              indexAxis: 'y',
              responsive: true,
              maintainAspectRatio: false,
              animation: { duration: 1000 },
              scales: {
                y: { grid: { display: false }, ticks: { color: '#888', font: { size: 8 } } },
                x: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#666', font: { size: 7 } } }
              },
              plugins: { 
                legend: { display: true, position: 'bottom', labels: { color: '#666', boxWidth: 10, font: { size: 8 } } }
              }
            }
          });
        };

// SENTINELS DATA

        var fetchSentinels = function() {
          if (typeof google !== 'undefined' && google.script) {
            google.script.run.withSuccessHandler(function(data) {
              console.log("[Sentinels] Data synced:", data);
              if (data && Array.isArray(data)) {
                sentinels.value = data;
              } else {
                sentinels.value = [];
              }
            }).getSentinelsUI();
          }
        };

        var deploySentinelPreset = function(preset) {
          isProcessing.value = true;
          addLog('SYS', 'Establishing handshake with Sentinel ' + preset.label + '...', 'info');
          if (typeof google !== 'undefined' && google.script) {
            google.script.run
              .withSuccessHandler(function(updatedList) {
                isProcessing.value = false;
                console.log("[Sentinels] Atomic update received:", updatedList);
                
                // DEFENSIVE: Ensure updatedList is an array before assigning
                if (updatedList && Array.isArray(updatedList)) {
                  sentinels.value = updatedList;
                  
                  // DEBUG LOGGING
                  var labels = sentinels.value.map(function(x) { return x.label; }).join(', ');
                  addLog('SYS', 'Active Sentinel Registry: [' + labels + ']', 'info');
                  
                  var s = sentinels.value.find(function(x) { return x.label === preset.label; });
                  if (s) {
                    addLog('VAULT', 'Sentinel ' + preset.label + ' state: ' + s.status, 'success');
                  } else {
                    addLog('VAULT', 'Sentinel ' + preset.label + ' deployment confirmed.', 'success');
                  }
                } else {
                  console.error("[Sentinels] Backend returned non-array data:", updatedList);
                  addLog('ERR', 'Handshake error: Invalid response from server.', 'error');
                  // Trigger a re-fetch to try and recover
                  fetchSentinels();
                }
              })
              .withFailureHandler(function(err) {
                isProcessing.value = false;
                console.error("[Sentinels] Handshake failed:", err);
                addLog('ERR', 'Sentinel Handshake Failed: ' + (err.message || 'Unknown Error'), 'error');
              })
              .executeCreateSentinel({
                label: preset.label,
                type: preset.type,
                condition: preset.condition,
                mission: preset.mission
              });
          }
        };

        // Reactive Helper for Status (EXTREME DEFENSE v2)
        var getSentinelStatus = function(label) {
          try {
            if (!sentinels || !sentinels.value || !Array.isArray(sentinels.value)) {
              return 'OFF';
            }
            
            if (sentinels.value.length === 0) return 'OFF';
            
            // 1. Try Exact Label Match
            var match = sentinels.value.find(function(s) { 
              return s && s.label && s.label.toString().trim().toUpperCase() === (label || "").toString().trim().toUpperCase(); 
            });
            
            if (match) return match.status || 'OFF';
            
            // 2. Try Partial Match (for old versions)
            var partial = sentinels.value.find(function(s) {
              return s && s.mission && label && s.mission.toLowerCase().includes(label.toLowerCase().replace('_', ' '));
            });
            
            return (partial && partial.status) ? partial.status : 'OFF';
          } catch (e) {
            console.error("[Sentinel_UI_Guard] Error in getSentinelStatus:", e);
            return 'OFF'; // Fail safe
          }
        };

        var toggleSentinel = function(preset) { deploySentinelPreset(preset); };

        var vectorStats = ref({ count: 0, lastInsight: "" });

        var leadEmailHistory = ref([]);

        var ingestGoogleDoc = function() {
          if (!gDocUrl.value) return;
          isProcessing.value = true;
          addLog("SYS", "Initiating Google Doc Ingestion...", "info");
          google.script.run.withSuccessHandler(function(res) {

            addLog("SYS", res, res.includes("Success") ? "success" : "error");

            fetchVectorStats();
          }).executeIngestGoogleDoc({ url: gDocUrl.value });

        var ingestApiData = function() {
          if (!apiUrl.value) return;
          isProcessing.value = true;
          addLog("SYS", "Initiating API Ingestion...", "info");
          google.script.run.withSuccessHandler(function(res) {
            isProcessing.value = false;
            try {
              var json = JSON.parse(res);
              if (json.success) {
                addLog("SYS", "API Data Ingested Successfully (Truncated: " + json.wasTruncated + ")", "success");
                addLog("DATA", json.data.substring(0, 100) + "...", "info");
                apiUrl.value = "";
              } else {
                addLog("SYS", "API Request Failed: " + (json.error || json.message), "error");
              }
            } catch (e) {
              addLog("SYS", "Failed to parse API ingest response.", "error");
            }
          }).executeApiIngest({ url: apiUrl.value });

        // --- GITHUB CODING AGENT FUNCTIONS ---
        var fetchRepoStructure = function() {
          if (!githubState.owner || !githubState.repo) {
            addLog("DEV", "Owner and Repository must be provided.", "error");
            return;
          }
          githubState.isFetchingTree = true;
          addLog("DEV", "Indexing repository: " + githubState.owner + "/" + githubState.repo, "info");
          
          google.script.run.withSuccessHandler(function(resStr) {
            githubState.isFetchingTree = false;
            try {
              var res = JSON.parse(resStr);
              if (res.error) throw new Error(res.error);
              if (res.tree) {
                githubState.tree = res.tree;
                addLog("DEV", "Repository tree indexed (" + res.tree.length + " items).", "success");
              }
            } catch (e) {
              addLog("DEV", "Tree Sync Failed: " + e.message, "error");
            }
          }).withFailureHandler(function(e) {
            githubState.isFetchingTree = false;
            addLog("DEV", "API Request Failed: " + e.message, "error");
          }).executeGithubReadRepoTree({ owner: githubState.owner, repo: githubState.repo, branch: githubState.branch });
        };

        var runCodingTask = function() {
          var input = githubState.userInput;
          if (!input.trim()) return;
          
          githubState.chatHistory.push({ role: 'user', text: input });
          githubState.userInput = "";
          githubState.isProcessing = true;

          // Pass the context of the selected repo
          var repoContext = "Target Repo: " + githubState.owner + "/" + githubState.repo + " (Branch: " + githubState.branch + "). ";
          var fullPrompt = repoContext + input;

          google.script.run.withSuccessHandler(function(responseStr) {
             githubState.isProcessing = false;
             githubState.chatHistory.push({ role: 'model', text: responseStr });
          }).withFailureHandler(function(e) {
             githubState.isProcessing = false;
             githubState.chatHistory.push({ role: 'model', text: "ERROR: " + e.message });

    app.mount('#app');
